<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Sistema CEP Jarinu</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<div class="sidebar">
<img src="/img/logo.png" class="logo">

<h3>CEP JARINU</h3>

<button onclick="mostrarPagina('consulta')">Consulta CEP</button>
<button class="admin"onclick="mostrarPagina('cadastro')">Cadastrar Logradouro</button>
<button class="admin"onclick="mostrarPagina('lista')">Listar Logradouros</button>
<!--<button onclick="logout()">Logout</button> -->

</div>

<div class="conteudo">

<!-- CONSULTA -->

<div id="consulta" class="pagina">

<h1>Consulta de CEP</h1>

<input type="text" id="rua" placeholder="Digite o nome da rua">

<div id="sugestoes"></div>

<button onclick="buscar()">Consultar</button>

<div id="resultado"></div>

</div>

<!-- LOGIN-->
 <div id="login" class="pagina">

<h2>Login Administrativo</h2>

<input id="usuario" placeholder="Usuário">

<br><br>

<input id="senha" type="password" placeholder="Senha">

<br><br>

<button onclick="login()">Entrar</button>

<div id="statusLogin"></div>

</div>

<!-- CADASTRO -->

<div id="cadastro" class="pagina" style="display:none">

<h1>Cadastrar Nova Rua</h1>

<input type="text" id="novo_logradouro" placeholder="Logradouro">
<input type="text" id="novo_bairro" placeholder="Bairro">
<input type="text" id="novo_cep" placeholder="CEP">
<input type="text" id="novo_situacao" placeholder="Situação">

<button onclick="cadastrarRua()">Cadastrar</button>

<div id="resultadoCadastro"></div>

</div>


<!-- LISTA -->

<div id="lista" class="pagina" style="display:none">

<h1>Logradouros Cadastrados</h1>

<input type="text" id="buscarRuaAdmin" placeholder="Buscar rua...">

<button onclick="carregarRuas()">Atualizar Lista</button>

<br><br>

<table id="tabelaRuas">

<thead>
<tr>
<th>Logradouro</th>
<th>Bairro</th>
<th>CEP</th>
<th>Situação</th>
<th>Ações</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>

<script src="/script.js"></script>

</body>
</html>
